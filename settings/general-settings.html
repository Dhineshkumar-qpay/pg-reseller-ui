<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- Top card -->
    <div class="card shadow-sm border mb-4 top-card-global">
      <div class="card-header py-3">
        <small class="text-muted">
          You are here : Settings >
          <strong class="text-dark"> Reseller general Settings</strong>
        </small>
      </div>
      <div class="card-body p-4">
        <p class="title">
          Please update your settings by entering your details below.
        </p>
      </div>
    </div>

    <!-- No record -->
    <div class="col-12 mb-4">
      <div class="note-card">Reseller personal details updated successfully</div>
    </div>

    <!-- Form Section -->
    <div class="card border border-light shadow-sm mb-4 rounded-2">
      <div class="card-body p-4">
        <form class="row g-4">
          <div class="col-12 col-md-6">
            <label for="companyname" class="custom-label"
              >Company Name <strong class="text-danger">*</strong></label
            >
            <input type="text" class="custom-input" id="companyname" required />
          </div>

          <div class="col-12 col-md-6">
            <label for="contactname" class="custom-label"
              >Contact Name <strong class="text-danger">*</strong></label
            >
            <input type="text" class="custom-input" id="contactname" required />
          </div>

          <div class="col-12 col-md-6">
            <label for="email" class="custom-label"
              >Email <strong class="text-danger">*</strong></label
            >
            <input type="email" class="custom-input" id="email" required />
          </div>

          <div class="col-12 col-md-6">
            <label for="mobile" class="custom-label"
              >Mobile Number <strong class="text-danger">*</strong></label
            >
            <input
              type="text"
              class="custom-input"
              id="mobile"
              maxlength="10"
              oninput="this.value = this.value.replace(/[^0-9]/g, '')"
              required
            />
          </div>
          <div class="col-12 col-md-6">
            <label for="address" class="custom-label"
              >Address <strong class="text-danger">*</strong></label
            >
            <input type="text" class="custom-input" id="address" required />
          </div>

          <div class="col-12 col-md-6">
            <label for="bankoption" class="custom-label">
              State <strong class="text-danger">*</strong>
            </label>
            <select class="custom-select" id="bankoption" required>
              <option value="">--Select--</option>
              <option value="tamilnadu">Tamil Nadu</option>
            </select>
          </div>

          <div class="col-12">
            <div class="horizontal-scroll d-flex gap-2 flex-nowrap pb-2">
              <button
                type="submit"
                class="btn btn-primary flex-shrink-0 text-nowrap"
              >
                Submit
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
